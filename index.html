<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Swing AI</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .hero{
      padding:80px 20px;
    }

    h1{
      font-size:60px;
      margin-bottom:20px;
    }

    p{
      font-size:22px;
      color:#cbd5e1;
    }

    button{
      margin-top:30px;
      padding:15px 30px;
      border:none;
      border-radius:12px;
      background:#22c55e;
      color:white;
      font-size:20px;
      cursor:pointer;
    }

    .card{
      background:#1e293b;
      margin:40px auto;
      padding:30px;
      border-radius:20px;
      width:320px;
    }

    video{
      margin-top:30px;
      width:90%;
      max-width:700px;
      border-radius:20px;
      display:none;
    }

    .result{
      margin-top:30px;
      font-size:24px;
      color:#22c55e;
    }
  </style>
</head>

<body>

  <div class="hero">

    <h1>🏌️ Golf Swing AI</h1>

    <p>
      KI Golf Swing Analyse Plattform
    </p>

    <input 
      type="file" 
      id="videoUpload" 
      accept="video/*" 
      style="display:none"
    >

    <button onclick="document.getElementById('videoUpload').click()">
      Video Hochladen
    </button>

    <br>

    <video 
      id="videoPreview" 
      controls
    ></video>

    <div class="result" id="analysisResult"></div>

    <div class="card">
      <h2>Swing Analyse</h2>

      <p>
        KI analysiert deinen Golfschwung
      </p>
    </div>

  </div>

  <script>
    const upload = document.getElementById("videoUpload");
    const preview = document.getElementById("videoPreview");
    const result = document.getElementById("analysisResult");

    upload.addEventListener("change", function () {

      const file = this.files[0];

      if (file) {

        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";

        result.innerHTML = `
          ✅ Analyse abgeschlossen<br><br>
          Swing Score: 82/100<br>
          Ballflug: leicht rechts<br>
          Tipp: Hüfte kontrollierter drehen
        `;
      }
    });
  </script>

</body>
</html>

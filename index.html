<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Golf Swing AI</title>

<style>

body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container{
  padding:50px 20px;
}

h1{
  font-size:50px;
}

p{
  color:#cbd5e1;
  font-size:20px;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
}

video{
  width:90%;
  max-width:700px;
  margin-top:30px;
  border-radius:20px;
  display:none;
}

.result{
  margin-top:30px;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  display:none;
}

.score{
  font-size:40px;
  color:#22c55e;
}

</style>
</head>

<body>

<div class="container">

<h1>🏌️ Golf Swing AI</h1>

<p>
Lade ein Golfvideo aus deiner Galerie hoch.
</p>

<input
  type="file"
  id="videoUpload"
  accept="video/mp4,video/quicktime,video/*"
>

<br>

<button onclick="analyzeSwing()">
Swing analysieren
</button>

<br>

<video
  id="videoPreview"
  controls
></video>

<div
  class="result"
  id="resultBox"
>

<div class="score">
82 / 100
</div>

<h2>
Analyse abgeschlossen ✅
</h2>

<p>
Dein Schwung ist stabil. Deine Hüfte öffnet sich jedoch etwas zu früh.
Versuche den Schläger länger gerade durch die Balllinie zu führen.
</p>

</div>

</div>

<script>

const upload =
document.getElementById("videoUpload");

const preview =
document.getElementById("videoPreview");

const result =
document.getElementById("resultBox");

upload.addEventListener("change", function(){

  const file = this.files[0];

  if(file){

    preview.src =
    URL.createObjectURL(file);

    preview.style.display =
    "block";

  }

});

function analyzeSwing(){

  if(preview.src){

    result.style.display =
    "block";

  } else {

    alert("Bitte zuerst ein Video hochladen.");

  }

}

</script>

</body>
</html>

<input 
  type="file" 
  id="videoUpload" 
  accept="video/*" 
  style="display:none"
>

<button onclick="document.getElementById('videoUpload').click()">
  Video Hochladen
</button>

<br><br>

<video 
  id="videoPreview" 
  controls 
  style="max-width:600px;width:90%;display:none;border-radius:20px;margin-top:30px;"
></video>

<script>
  const upload = document.getElementById("videoUpload");
  const preview = document.getElementById("videoPreview");

  upload.addEventListener("change", function () {
    const file = this.files[0];

    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
    }
  });
</script>
